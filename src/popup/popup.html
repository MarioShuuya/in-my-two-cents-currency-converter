<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <h1>In My Two Cents</h1>

    <div class="converter">
      <div class="converter-row">
        <select id="source-currency"></select>
        <button id="swap" class="swap-btn" title="Swap currencies">&#8646;</button>
        <select id="target-currency"></select>
      </div>

      <div class="input-row">
        <input type="text" id="amount" placeholder="0" inputmode="decimal" autocomplete="off">
      </div>

      <div class="result-row">
        <span id="result">0</span>
      </div>

      <p class="rate-value">Rate: <span id="current-rate">loading...</span></p>
    </div>

    <div class="format-row">
      <label for="number-format">Format:</label>
      <select id="number-format">
        <option value="auto">Auto</option>
        <option value="period">1,234.56</option>
        <option value="comma">1.234,56</option>
      </select>
    </div>

    <button id="open-options">Settings</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
