<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <!-- Background circle -->
  <circle cx="48" cy="48" r="46" fill="#4a90d9"/>
  <circle cx="48" cy="48" r="43" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.3"/>

  <!-- Left coin -->
  <ellipse cx="34" cy="44" rx="18" ry="18" fill="#f5c842" stroke="#d4a017" stroke-width="1.5"/>
  <ellipse cx="34" cy="44" rx="14" ry="14" fill="none" stroke="#d4a017" stroke-width="1" opacity="0.5"/>
  <text x="34" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#8b6914">$</text>

  <!-- Right coin (overlapping) -->
  <ellipse cx="58" cy="52" rx="18" ry="18" fill="#e8e8e8" stroke="#b0b0b0" stroke-width="1.5"/>
  <ellipse cx="58" cy="52" rx="14" ry="14" fill="none" stroke="#b0b0b0" stroke-width="1" opacity="0.5"/>
  <text x="58" y="58" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#555">&#8364;</text>

  <!-- Conversion arrows -->
  <g stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Top arrow (right) -->
    <path d="M30 22 L62 22"/>
    <polyline points="57,17 62,22 57,27"/>
    <!-- Bottom arrow (left) -->
    <path d="M62 74 L30 74"/>
    <polyline points="35,69 30,74 35,79"/>
  </g>
</svg>
